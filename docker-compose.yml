services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: creative
      POSTGRES_PASSWORD: creative
      POSTGRES_DB: creativegen
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creative -d creativegen"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "5433:5432"

  backend:
    build: .
    environment:
      DATABASE_URL: postgres://creative:creative@db:5432/creativegen
      LOAD_PRESSURE: "0.35"
      GEN_SLOW_S: "0.0"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
